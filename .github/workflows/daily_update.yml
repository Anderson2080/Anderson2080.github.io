name: Daily Website Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间早上8点自动运行
  workflow_dispatch: # 允许你随时手动点击运行

# 赋予机器人修改网页代码的权限（非常重要）
permissions:
  contents: write

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install -r requirements.txt

      - name: 运行 AI 更新脚本
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }} # 从 GitHub 密码本读取你的 Groq 密码
        run: python update_site.py

      - name: 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add index.html
          git commit -m "🤖 自动更新每日 AI 资讯" || echo "今天没有新内容"
          git push
