name: Daily Website Update

on:
  schedule:
    - cron: '0 23 * * *' # UTC的23点，即北京时间早上7点
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-website:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖包
        run: pip install -r requirements.txt

      - name: 运行 AI 更新脚本
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python update_site.py

      - name: 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # 关键修改：允许机器人上传自动生成的新文件夹和历史文章
          git add -A 
          git commit -m "🤖 自动生成深度研判并更新文库" || echo "今天没有新内容"
          git push
